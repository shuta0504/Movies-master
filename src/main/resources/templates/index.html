<!DOCTYPE html>

<body xmlns:th="http://www.thymeleaf.org">

	<head>
		<meta charset="UTF-8">
		<title>MOVIES FAN</title>
		<style>
			body {
				font-family: 'Helvetica Neue';
				background-color: #1a1a1a;
				color: #eee;
				padding: 20px;
				margin: 0;
			}

			h1 {
				text-align: center;
				color: #e50914;
				text-transform: uppercase;
				letter-spacing: 2px;
			}

			.post-new-wrapper {
				text-align: center;
				margin: 30px 0;
			}

			.btn-new-post {
				display: inline-block;
				background-color: #e50914;
				color: white;
				text-decoration: none;
				font-weight: bold;
				padding: 12px 30px;
				border-radius: 50px;
				font-size: 1.1em;
				transition: 0.3s;
				box-shadow: 0 4px 15px rgba(229, 9, 20, 0, 3);
			}

			.post-card {
				background: #2a2a2a;
				padding: 15px;
				margin: 10px auto;
				max-width: 500px;
				border-left: 5px solid #e50914;
				border-radius: 4px;
				box-shadow: 0 4px 15px rgba(40, 40, 40, 0.9);
			}

			.movie-title {
				font-size: 1.3em;
				/* 1.8emから縮小 */
				color: #e50914;
				margin-bottom: 10px;
				border-bottom: 1px solid #333;
				padding-bottom: 5px;
			}

			.content {
				font-size: 0.95em;
				line-height: 1.5;
				color: #ccc;
			}

			.media-container img,
			.media-container video {
				width: 100%;
				height: auto;
				max-height: 150px;
				object-fit: contain;
				border-radius: 6px;
				display: block;
				margin: 10px auto;
			}
		</style>
		<link rel="stylesheet" th:href="@{/css/style.css}">
	</head>
	<div>
		<h1>Movies LINEUP🍿</h1>
		<div style="text-align: center; margin-bottom: 20px;">
			<form th:action="@{/}" method="get" style="display: inline-flex; gap: 10px;">
				<input type="text" name="keyword" th:value="${keyword}" placeholder="映画名やキーワードを検索..."
					style="padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; width: 250px;">
				<button type="submit"
					style="background: #e50914; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
					検索
				</button>
				<a th:href="@{/}" th:if="${keyword != null}"
					style="color: #888; text-decoration: none; align-self: center;">クリア</a>
			</form>
		</div>
		<div class="post-new-wrapper">
			<a th:href="@{/post/new}" class="btn-new-post">+新規投稿を作成</a>
		</div>
		<hr>

		<div class="post-wrapper">

			<div th:each="post : ${posts}" class="post-card">
				<a th:href="@{/post/{id}(id=${post.id})}" style="text-decoration: none; color: inherit;">
					<h2 class="movie-title" th:text="${post.movieTitle}">映画タイトル</h2>
					<p class="content" th:text="${post.content}">ここに感想が表示されます</p>
				</a>

				<div class="media-container">
					<img th:if="${post.imageUrl}" th:src="${post.imageUrl}" alt="投稿画像">
					<video th:if="${post.videoUrl}" th:src="${post.videoUrl}" controls></video>
				</div>
				<div class="comment-section" style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">

					<div style="margin-bottom: 8px;">
						<span style="color: #e50914; font-size: 0.9em; font-weight: bold;">
							💬 <span th:text="${post.comments.size()}">0</span> 件のコメント
						</span>
					</div>

					<div th:if="${!post.comments.isEmpty()}"
						style="background: #222; padding: 8px; border-radius: 4px; margin-bottom: 10px;">
						<p style="font-size: 0.85em; color: #bbb; margin: 0;" th:text="${post.comments[0].content}"></p>
					</div>

					<a th:href="@{/post/{id}(id=${post.id})}"
						style="font-size: 0.85em; color: #888; text-decoration: none;">
						コメント
					</a>
				</div>
				<div class="like-section" style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
					<button type="button" th:onclick="|toggleLike(${post.id}, this)|"
						style="background: none; border: 1px solid #444; color: #eee; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px;">
						<span style="color: #e50914;">❤️</span>
						<span class="like-count" style="font-size: 0.9em; font-weight: bold;"
							th:text="${post.likes != null ? post.likes.size() : 0}">0</span>
					</button>
				</div>

				<p><small
						th:text="${post.createdAt != null ? #temporals.format(post.createdAt,'yyyy/MM/dd HH:mm') : ''}"></small>
				</p>
			</div>
		</div>
	</div>
	<script th:inline="javascript">
		function toggleLike(postId, buttonElement) {
			// /*[[...]]*/ の形式で書くことで、Eclipseのエラーを回避しつつThymeleafで値を取得できます
			const token = /*[[${_csrf?.token}]]*/ "";
			const header = /*[[${_csrf?.headerName}]]*/ "X-CSRF-TOKEN";

			fetch(`/post/${postId}/like`, {
				method: 'POST',
				headers: {
					[header]: token,
					'Content-Type': 'application/json'
				}
			})
				.then(response => {
					if (!response.ok) throw new Error('エラーが発生しました');
					return response.json();
				})
				.then(count => {
					const countSpan = buttonElement.querySelector('.like-count');
					countSpan.textContent = count;

					buttonElement.style.transform = "scale(1.2)";
					setTimeout(() => buttonElement.style.transform = "scale(1)", 200);
				})
				.catch(error => {
					console.error('Error:', error);
				});
		}
	</script>
</body>
</body>

</html>
