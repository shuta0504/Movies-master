<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ログイン - Movies App</title>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
	<style>
		body {
			margin: 0;
			font-family: 'Bebas Neue', sans-serif;
			letter-spacing: 2px;
			background-size: cover;
			background-position: center;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			color: #770000;
			text-align: center;
			overflow: hidden;
		}

		.slideshow {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: -1;
		}

		.slide {
			position: absolute;
			width: 100%;
			height: 100%;
			background-size: cover;
			background-position: center;
			opacity: 0;
			animation: slideAnimation 15s infinite;
		}

		.slide:nth-child(1) {
			background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoyYaRJTEFM8Eylq0NBx1kWfxGUMFYl5OJ7w&s');
		}

		.slide:nth-child(2) {
			background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://img.freepik.com/free-photo/rows-red-seats-theater_53876-64710.jpg?semt=ais_hybrid&w=740&q=80');
			animation-delay: 5s;
		}

		.slide:nth-child(3) {
			background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');
			animation-delay: 10s;
		}

		@keyframes slideAnimation {
			0% {
				opacity: 0;
			}

			10% {
				opacity: 1;
			}

			33% {
				opacity: 1;
			}

			43% {
				opacity: 0;
			}

			100% {
				opacity: 0;
			}
		}

		.login-card {
			background-color: rgba(0, 0, 0, 0.75);
			padding: 40px;
			border-radius: 8px;
			width: 100%;
			max-width: 400px;
			box-shadow: 0 15px 25px rgba(0, 0, 0, 0.5);
		}

		h2 {
			margin-top: 0;
			margin-bottom: 20px;
			font-size: 60px;
			font-family: 'Cinzel', serif;
			text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
			color: #e50914;
		}

		.input-group {
			margin-bottom: 20px;
			text-align: left;
		}

		.input-group label {
			font-family: 'Noto Sans JP', sans-serif;
			display: block;
			margin-bottom: 8px;
			color: #ccc;
			font-size: 14px;
		}

		input[type="text"],
		input[type="password"] {
			width: 100%;
			padding: 12px;
			border: none;
			border-radius: 4px;
			background: #333;
			color: white;
			box-sizing: border-box;
		}

		button {
			width: 100%;
			padding: 14px;
			background-color: #e50914;
			color: white;
			border: none;
			border-radius: 4px;
			font-size: 16px;
			font-weight: 700;
			cursor: pointer;
			margin-top: 24px;
			transition: background 0.2s;
		}

		button:hover {
			background-color: #b20710;
		}

		.message {
			padding: 10px;
			border-radius: 4px;
			font-size: 14px;
			margin-bottom: 15px;
			color: white;
			font-family: 'Noto Sans JP', sans-serif;
		}
	</style>
</head>

<body>
	<div class="slideshow">
		<div class="slide"></div>
		<div class="slide:nth-child(2)"></div>
		<div class="slide:nth-child(3)"></div>
	</div>

	<div class="login-card">
		<h2>Movies</h2>

		<div th:if="${param.error}" class="message" style="background-color: #e87c03;">
			ユーザー名またはパスワードが違います。
		</div>
		<!--新規登録が成功した際に表示する-->
		<div th:if="${param.register_success}" class="message" style="background-color: #2e7d32;">
			ユーザー登録が完了しました。</br>
			ログインしてください。
		</div>

		<div th:if="${param.logout}" class="message" style="background-color: #2b78e4;">
			ログアウトしました。
		</div>

		<form th:action="@{/login}" method="post">
			<div class="input-group">
				<label>ユーザー名</label>
				<input type="text" name="username" placeholder="ユーザー名" required />
			</div>

			<div class="input-group">
				<label>パスワード</label>
				<input type="password" name="password" placeholder="パスワード" required />
			</div>

			<button type="submit">ログイン</button>
		</form>
		<div style="margin-top: 20px;">
			<a th:href="@{/register}"
				style="color: #ccc; text-decoration: none; font-family: 'Noto Sans JP', sans-serif; font-size: 14px;">
				新規登録はこちら
			</a>
		</div>
	</div>
</body>

</html>
