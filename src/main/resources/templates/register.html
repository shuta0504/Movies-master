<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>新規登録 - Movies App</title>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

	<!--login.htmlのstyleから転用-->
	<style>
		body {
			margin: 0;
			font-family: 'Bebas Neue', sans-serif;
			letter-spacing: 2px;
			background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://img.freepik.com/free-photo/rows-red-seats-theater_53876-64710.jpg?semt=ais_hybrid&w=740&q=80');
			background-size: cover;
			background-position: center;
			height: 100vh;
			display: flex;
			justify-content: center;
			/* 左右中央 */
			align-items: center;
			/* 上下中央 */
			color: #770000;
			text-align: center;
			overflow: hidden;
		}

		.login-card {
			background-color: rgba(0, 0, 0, 0.75);
			padding: 40px;
			border-radius: 8px;
			width: 100%;
			max-width: 400px;
			box-shadow: 0 15px 25px rgba(0, 0, 0, 0.5);
		}

		h2 {
			margin-top: 0;
			margin-bottom: 5px;
			font-size: 40px;
			font-family: 'Cinzel', serif;
			text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
			color: #e50914;
		}
		
		h3 {
					margin-top: 0;
					margin-bottom: 20px;
					font-size: 20px;
					font-family: 'Cinzel', serif;
					text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
					color: #e50914;
				}

		.input-group {
			margin-bottom: 20px;
			text-align: left;
		}

		.input-group label {
			font-family: 'Noto Sans JP', sans-serif;
			display: block;
			margin-bottom: 8px;
			color: #ccc;
			font-size: 14px;
		}

		input[type="text"],
		input[type="password"] {
			width: 100%;
			padding: 12px;
			border: none;
			border-radius: 4px;
			background: #333;
			color: white;
			box-sizing: border-box;
		}

		button {
			width: 100%;
			padding: 14px;
			background-color: #e50914;
			color: white;
			border: none;
			border-radius: 4px;
			font-size: 16px;
			font-weight: 700;
			cursor: pointer;
			margin-top: 24px;
			transition: background 0.2s;
		}

		button:hover {
			background-color: #b20710;
		}

		.back-link {
			margin-top: 20px;
			display: block;
			color: #ccc;
			text-decoration: none;
			font-family: 'Noto Sans JP', sans-serif;
			font-size: 14px;
		}
	</style>
</head>

<body>
	<div class="login-card">
		<h2>Registration</h2>
		<h3>-ユーザー作成-</h3>

		<form th:action="@{/register}" method="post">
			<div class="input-group">
				<label>ユーザー名</label>
				<input type="text" name="username" placeholder="ユーザー名を入力" required />
			</div>

			<div class="input-group">
				<label>パスワード</label>
				<input type="password" name="password" placeholder="パスワードを入力" required />
			</div>

			<button type="submit">新規登録</button>
		</form>

		<a th:href="@{/login}" class="back-link">ログイン画面へ戻る</a>
	</div>
</body>

</html>
